metrics:
  enabled: true
  cost:
    # 운영 비용 추정용 단가(1K 토큰당, USD). 사용자 과금과 무관.
    currency: USD
    providers:
      groq:                      # llama-3.1-8b-instant: $0.05/1M in, $0.08/1M out (groq.com/pricing, 2026-06)
        prompt-per-1k: 0.00005
        completion-per-1k: 0.00008
      ollama-7b:                 # 로컬(self-host) = 금전 비용 0
        prompt-per-1k: 0.0
        completion-per-1k: 0.0
      ollama-1b:
        prompt-per-1k: 0.0
        completion-per-1k: 0.0
      ollama:                    # agent 채널 ollama provider 이름(AppConfig ollamaAgentClient)
        prompt-per-1k: 0.0
        completion-per-1k: 0.0

spring:
  application:
    name: rag-assistant
  datasource:
    url: jdbc:postgresql://localhost:15432/rag_assistant
    username: rag_assistant
  sql:
    init:
      mode: always   # schema.sql 자동 실행(call_sessions/call_turns, IF NOT EXISTS). 기존 테이블은 미포함이라 무영향
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  profiles:
    active: local   # 선택: local에서만 debug API + swagger 세부 제어할 때

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

server:
  port: 8080

ollama:
  base-url: http://localhost:11434
  chat-model: qwen2.5:7b
  small-chat-model: llama3.2:1b
  classifier-model: qwen2.5:3b
  embedding-model: nomic-embed-text
  temperature: 0
  timeout-ms: 120000        # chat/embedding read timeout. 느린 로컬 모델 벤치마크 시 상향(예: --ollama.timeout-ms=300000)

rag:
  chunk-size: 450
  chunk-overlap: 150
  top-k: 10
  min-score: 0.2
  embedding-dimension: 768
  # --- hybrid search ---
  hybrid-enabled: true      # true 시 pg_trgm + RRF hybrid (vector-only 회귀와 다름)
  lexical-top-k: 10         # lexical leg 후보 수 (보통 vector top-k와 동일)
  lexical-min-score: 0.1    # pg_trgm similarity 하한 (0~1)
  rrf-k: 60                 # RRF 상수, 논문/Elasticsearch 관례값
  # --- rerank (2단계 retrieval) ---
  rerank-enabled: true      # 기본 on. 끄면 기존 top-k 동작
  candidate-top-k: 30       # rerank 전 후보 폭 (vector·lexical 공통)
  rerank-top-n: 8           # rerank 후 context 개수
  reranker:
    base-url: http://localhost:8085   # 1단계 TEI 컨테이너
    model: BAAI/bge-reranker-v2-m3
    timeout-ms: 5000        # CPU/GPU 추론 지연 대비. 초과 시 fallback

llm:
  routing-strategy: fixed             # fixed(기본) | difficulty
  default-provider: ollama-7b
  fallback-order: [ollama-7b, groq]   # primary 죽으면 SaaS로 폴백
  difficulty:                         # routing-strategy=difficulty 일 때만 사용
    easy-provider: ollama-1b
    hard-provider: ollama-7b
  openai-compat:
    enabled: false                    # 로컬에서 키와 함께 true (application-local.yml)
    name: groq
    base-url: https://api.groq.com/openai/v1
    model: llama-3.1-8b-instant
    timeout-ms: 8000

agent:
  max-steps: 5
  max-tool-calls: 10                # 전역 도구 호출 총량 상한(런어웨이 방지). 초과 시 도구 없이 강제 종결
  timeout-ms: 180000
  provider-order: [groq, ollama]    # Groq 우선, 실패/비활성 시 ollama 폴백
  max-history-turns: 6              # 멀티턴 메모리 상한
  read-max-chunks: 6
  read-max-chars: 4000
  summarize-max-chars: 8000

voice:
  tts:
    enabled: false                  # 기본 off(브라우저 폴백). 서버 Google TTS 쓰려면 local에서 true + GOOGLE_APPLICATION_CREDENTIALS
    language-code: ko-KR
    voice-name: ko-KR-Neural2-A     # Neural2 한국어 음성 (저지연)
    speaking-rate: 1.0
  stt:
    enabled: false                  # 기본 off(브라우저 Web Speech 단독). 클라우드 STT 쓰려면 local에서 true + llm.openai-compat.api-key(Groq)
    model: whisper-large-v3-turbo   # Groq 다국어 전사 모델 (무료 티어: 20 RPM / 2000 RPD)
    language: ko
    base-url: https://api.groq.com/openai/v1   # llm.openai-compat.base-url과 동일(키 재사용)
    timeout-ms: 15000

logging:
  level:
    com.example.ragassistant: INFO
