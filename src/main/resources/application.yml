spring:
  application:
    name: rag-assistant
  datasource:
    url: jdbc:postgresql://localhost:15432/rag_assistant
    username: rag_assistant
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  profiles:
    active: local   # 선택: local에서만 debug API + swagger 세부 제어할 때

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

server:
  port: 8080

ollama:
  base-url: http://localhost:11434
  chat-model: qwen2.5:7b
  embedding-model: nomic-embed-text
  temperature: 0

rag:
  chunk-size: 450
  chunk-overlap: 150
  top-k: 10
  min-score: 0.2
  embedding-dimension: 768
  # --- hybrid search ---
  hybrid-enabled: true     # 기본 off: 기존 vector-only와 동일
  lexical-top-k: 10         # lexical leg 후보 수 (보통 vector top-k와 동일)
  lexical-min-score: 0.1    # pg_trgm similarity 하한 (0~1)
  rrf-k: 60                 # RRF 상수, 논문/Elasticsearch 관례값

logging:
  level:
    com.example.ragassistant: INFO
