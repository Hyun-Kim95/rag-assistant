spring:
  application:
    name: rag-assistant
  datasource:
    url: jdbc:postgresql://localhost:15432/rag_assistant
    username: rag_assistant
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  profiles:
    active: local   # 선택: local에서만 debug API + swagger 세부 제어할 때

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

server:
  port: 8080

ollama:
  base-url: http://localhost:11434
  chat-model: qwen2.5:7b
  embedding-model: nomic-embed-text
  temperature: 0

rag:
  chunk-size: 450
  chunk-overlap: 150
  top-k: 10
  min-score: 0.2
  embedding-dimension: 768
  # --- hybrid search ---
  hybrid-enabled: true    # true 시 pg_trgm + RRF hybrid (vector-only 회귀와 다름)
  lexical-top-k: 10         # lexical leg 후보 수 (보통 vector top-k와 동일)
  lexical-min-score: 0.1    # pg_trgm similarity 하한 (0~1)
  rrf-k: 60                 # RRF 상수, 논문/Elasticsearch 관례값
  # --- rerank (2단계 retrieval) ---
  rerank-enabled: true      # 기본 on. 끄면 기존 top-k 동작
  candidate-top-k: 30       # rerank 전 후보 폭 (vector·lexical 공통)
  rerank-top-n: 8           # rerank 후 context 개수
  reranker:
    base-url: http://localhost:8085   # 1단계 TEI 컨테이너
    model: BAAI/bge-reranker-v2-m3
    timeout-ms: 5000        # CPU/GPU 추론 지연 대비. 초과 시 fallback

logging:
  level:
    com.example.ragassistant: INFO
