spring:
  application:
    name: rag-assistant
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_assistant
    username: rag_assistant
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  profiles:
    active: local   # 선택: local에서만 debug API + swagger 세부 제어할 때

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

server:
  port: 8080

ollama:
  base-url: http://localhost:11434
  chat-model: qwen2.5:7b
  embedding-model: nomic-embed-text

rag:
  chunk-size: 700
  chunk-overlap: 100
  top-k: 3
  min-score: 0.2

logging:
  level:
    com.example.ragassistant: INFO
